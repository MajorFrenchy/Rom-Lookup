<title>VPX ROM Lookup</title>
<style>

  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; }
  .header { position: sticky; top: 0; z-index: 10; background: #0d1117; border-bottom: 1px solid #21262d; padding: 12px 16px 10px; }
  .header h1 { font-size: 1rem; font-weight: 700; color: #58a6ff; margin-bottom: 8px; }
  .search-wrap { position: relative; }
  .search-wrap input { width: 100%; padding: 10px 36px 10px 14px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; color: #e6edf3; font-size: 1rem; outline: none; -webkit-appearance: none; }
  .search-wrap input:focus { border-color: #58a6ff; }
  .search-wrap input::placeholder { color: #484f58; }

  .clear-btn.visible { display: block; }
  .pills { display: flex; gap: 6px; margin-top: 8px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
  .pills::-webkit-scrollbar { display: none; }
  .pill { flex-shrink: 0; padding: 5px 12px; border-radius: 20px; border: 1px solid #30363d; background: transparent; color: #8b949e; font-size: 0.78rem; cursor: pointer; transition: all 0.15s; }
  .pill.active { border-color: #58a6ff; background: #1f3a5f; color: #79c0ff; }

  .result-count { padding: 8px 16px; font-size: 0.75rem; color: #8b949e; border-bottom: 1px solid #21262d; display: none; }
  .card { padding: 14px 16px; border-bottom: 1px solid #21262d; }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
  .card-name { font-size: 0.95rem; font-weight: 600; color: #e6edf3; flex: 1; }
  .card-rom { font-family: 'Courier New', monospace; font-size: 0.9rem; color: #3fb950; background: #1a2332; display: inline-block; padding: 3px 8px; border-radius: 4px; margin-bottom: 8px; }
  .card-rom.em { color: #484f58; background: #161b22; font-style: italic; }
  .card-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 10px; }
  .meta-item { font-size: 0.75rem; color: #8b949e; }
  .meta-sep { color: #30363d; }
  .card-actions { display: flex; gap: 8px; }
  a.vps-link, button.preview-btn {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 0.78rem; padding: 6px 12px; border-radius: 6px;
    border: 1px solid #30363d; white-space: nowrap; cursor: pointer;
    text-decoration: none; transition: all 0.15s;
  }
  a.vps-link { color: #8b949e; background: transparent; }
  a.vps-link:active { color: #58a6ff; border-color: #58a6ff; background: #1f2d3f; }
  button.preview-btn { color: #8b949e; background: transparent; }
  button.preview-btn:active { color: #3fb950; border-color: #3fb950; background: #1a2d1a; }
  .no-results { text-align: center; padding: 40px 20px; color: #484f58; font-size: 0.9rem; }

  /* ── DRAWER ── */
  .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .drawer-overlay.open { opacity: 1; pointer-events: all; }
  .drawer { position: fixed; bottom: 0; left: 0; right: 0; background: #161b22; border-top: 1px solid #30363d; border-radius: 16px 16px 0 0; z-index: 101; padding: 20px 16px 32px; max-height: 85vh; overflow-y: auto; transform: translateY(100%); transition: transform 0.25s cubic-bezier(0.4,0,0.2,1); }
  .drawer-overlay.open .drawer { transform: translateY(0); }
  .drawer-handle { width: 36px; height: 4px; background: #30363d; border-radius: 2px; margin: 0 auto 16px; }
  .drawer-title { font-size: 1rem; font-weight: 700; color: #e6edf3; margin-bottom: 4px; }
  .drawer-meta { font-size: 0.78rem; color: #8b949e; margin-bottom: 14px; }
  .drawer-meta .rom-tag { font-family: monospace; color: #3fb950; background: #1a2d1a; padding: 1px 5px; border-radius: 3px; }
  .img-scroll { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 8px; scrollbar-width: none; margin-bottom: 14px; }
  .img-scroll::-webkit-scrollbar { display: none; }
  .img-card { flex-shrink: 0; width: 200px; background: #0d1117; border: 1px solid #21262d; border-radius: 8px; overflow: hidden; }
  .img-card-label { font-size: 0.68rem; color: #8b949e; text-transform: uppercase; letter-spacing: 0.05em; padding: 5px 8px; border-bottom: 1px solid #21262d; }
  .img-card img { width: 100%; display: block; object-fit: contain; min-height: 100px; background: #0d1117; }
  .img-card img.loading { opacity: 0.3; }
  .img-card .no-img { display: flex; align-items: center; justify-content: center; min-height: 100px; color: #484f58; font-size: 0.75rem; }
  .drawer-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .drawer-actions a { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 8px; font-size: 0.82rem; text-decoration: none; border: 1px solid #30363d; color: #8b949e; }
  .drawer-actions a:active { border-color: #58a6ff; color: #58a6ff; }
</style>

const BASE = 'https://github.com/superhac/vpinmediadb/raw/refs/heads/main';
let filterMode = 'all', currentFiltered = [];

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function setFilter(mode) {
  filterMode = mode;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  document.getElementById('pill-' + mode).classList.add('active');
  applyFilters();
}
function clearSearch() {
  document.getElementById('search').value = '';
  document.getElementById('clear-btn').classList.remove('visible');
  showEmpty();
}
function showEmpty() {
  document.getElementById('empty-state').style.display = '';
  document.getElementById('results').innerHTML = '';
  document.getElementById('result-count').style.display = 'none';
}
function openPreview(idx) {
  const r = currentFiltered[idx];
  const gid = r.gameId;
  document.getElementById('drawer-title').textContent = r.name;
  document.getElementById('drawer-meta').innerHTML =
    `<span>${escHtml(r.manuf)} ${escHtml(r.year)}</span>` +
    (r.rom ? ` · <span class="rom-tag">${escHtml(r.rom)}</span>` : '') +
    ` · <span>by ${escHtml(r.creator)}</span>`;

  const scroll = document.getElementById('img-scroll');
  if (gid) {
    const cabUrl = BASE + '/' + gid + '/cab.png';
    const imgEl = document.createElement('img');
    imgEl.src = cabUrl;
    imgEl.alt = 'Cabinet';
    imgEl.style.cssText = 'max-width:100%;max-height:55vh;object-fit:contain;border-radius:8px;display:block;margin:0 auto;background:#0d1117;';
    imgEl.onerror = function() { this.outerHTML = '<div style="color:#484f58;font-size:0.82rem;text-align:center;padding:32px 0">No cabinet image available</div>'; };
    scroll.innerHTML = '';
    scroll.appendChild(imgEl);
  } else {
    scroll.innerHTML = '<div style="color:#484f58;font-size:0.82rem">No media available</div>';
  }

  const actions = document.getElementById('drawer-actions');
  actions.innerHTML = '';
  if (gid) {
    const vpsUrl = `https://virtualpinballspreadsheet.github.io/tables?game=${gid}`;
    actions.innerHTML += `<a href="${vpsUrl}" target="_blank" rel="noopener"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>View on VPS</a>`;
  }

  document.getElementById('drawer-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeDrawer(e) {
  if (!e || e.target === document.getElementById('drawer-overlay')) {
    document.getElementById('drawer-overlay').classList.remove('open');
    document.body.style.overflow = '';
  }
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });

function applyFilters() {
  const q = document.getElementById('search').value.trim();
  const ql = q.toLowerCase();
  document.getElementById('clear-btn').classList.toggle('visible', q.length > 0);
  if (!q) { showEmpty(); return; }
  currentFiltered = RAW.filter(r => {
    const matchSearch = r.name.toLowerCase().includes(ql) || r.rom.toLowerCase().includes(ql) || r.combined.toLowerCase().includes(ql);
    const matchFilter = filterMode === 'all' || (filterMode === 'rom' && r.rom) || (filterMode === 'em' && !r.rom);
    return matchSearch && matchFilter;
  });
  document.getElementById('empty-state').style.display = 'none';
  const countEl = document.getElementById('result-count');
  countEl.style.display = '';
  countEl.textContent = currentFiltered.length + ' result' + (currentFiltered.length !== 1 ? 's' : '');
  const results = document.getElementById('results');
  if (currentFiltered.length === 0) { results.innerHTML = '<div class="no-results">No results found</div>'; return; }
  results.innerHTML = currentFiltered.map((r, idx) => {
    const romClass = r.rom ? 'card-rom' : 'card-rom em';
    const romText = r.rom ? escHtml(r.rom) : 'EM / No ROM';
    const romBracket = r.rom ? ` <span style="color:#3fb950;font-size:0.78rem;font-weight:400">(${escHtml(r.rom)})</span>` : '';
    const previewBtnHtml = r.gameId ? `<button class="preview-btn" onclick="openPreview(${idx})"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>Preview</button>` : '';
    const vpsHtml = r.gameId ? `<a class="vps-link" href="https://virtualpinballspreadsheet.github.io/tables?game=${r.gameId}" target="_blank" rel="noopener"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>VPS</a>` : '';
    return `<div class="card">
      <div class="card-header">
        <div class="card-name">${escHtml(r.name)}${romBracket}</div>
      </div>
      <div class="${romClass}">${romText}</div>
      <div class="card-meta">
        <span class="meta-item">${escHtml(r.manuf)}</span>
        <span class="meta-sep">·</span>
        <span class="meta-item">${escHtml(r.year)}</span>
        <span class="meta-sep">·</span>
        <span class="meta-item">by ${escHtml(r.creator)}</span>
      </div>
      <div class="card-actions">${previewBtnHtml}${vpsHtml}</div>
    </div>`;
  }).join('');
}
document.getElementById('search').addEventListener('input', applyFilters);
</script>
